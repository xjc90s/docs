date: '2026-07-16'
intro: |
  > [!NOTE] As part of a security enhancement to {% data variables.product.prodname_ghe_server %} support bundle uploads, {% data variables.product.company_short %} will begin rejecting uploads from older unpatched appliances on August 18, 2026. Please update to this patch release to avoid interruptions when submitting support bundles with `ghe-support-bundle`, `ghe-cluster-support-bundle`, or `ghe-support-upload`. The minimum required patch versions to submit support bundles are 3.21.3, 3.20.5, 3.19.9, 3.18.12, and 3.17.18. If you cannot update to the required patch version before August 18, 2026, and need to upload a support bundle, contact [GitHub Support](https://support.github.com/enterprise-and-teams#enterprise-administrators-server) for guidance.
sections:
  features:
    - |
      Site administrators can configure a customer-managed cloud object store (Amazon S3, Azure Blob Storage, or Google Cloud Storage) as an Elasticsearch snapshot repository. This enables incremental Elasticsearch snapshots for backup, restore, and disaster recovery. Management scripts are available for manual snapshot operations and testing.
  security_fixes:
    - |
      **HIGH**: An attacker who had code execution inside the Dependabot updater container could write attacker-controlled files to arbitrary paths in a repository that Dependabot updates, including GitHub Actions workflow files. This was possible because dependency-file path validation checked only the declared file name and not the effective path derived from the file's directory and symlink target. If the repository used a pull_request_target workflow or had auto-merge enabled, the injected workflow could execute with access to the repository's GitHub Actions secrets. GitHub has requested CVE ID [CVE-2026-15343](https://www.cve.org/cverecord?id=CVE-2026-15343) for this vulnerability.
    - |
      **MEDIUM**: An attacker could render a GitHub Enterprise Server instance unresponsive, causing a denial of service, by adding a repository release notes configuration file containing deeply nested YAML and then generating release notes. GitHub has requested CVE ID [CVE-2026-15007](https://www.cve.org/cverecord?id=CVE-2026-15007) for this vulnerability, which was reported via the [GitHub Bug Bounty program](https://bounty.github.com/).
    - |
      **MEDIUM**: An attacker with write access to any repository on a GitHub Enterprise Server instance could read metadata from private repositories they could not access, including repository owners and names, branch names, commit SHAs, commit messages, and the pushing actor because the delegated bypass endpoint resolved a rule suite from an attacker-supplied identifier without checking that the user could read its repository, and these sequential identifiers could be enumerated. GitHub has requested CVE ID [CVE-2026-15783](https://www.cve.org/cverecord?id=CVE-2026-15783) for this vulnerability, which was reported via the [GitHub Bug Bounty program](https://bounty.github.com/).
    - |
      Packages have been updated to the latest security versions.
  bugs:
    - |
      Users experienced `ghe-maintenance -q` reporting that maintenance mode was not set when only `maintenance-git.html` remained after a replication restart. GHES now removes the dangling git maintenance lock during `ghe-repl-start` and reports maintenance mode correctly.
    - |
      During upgrades of high-availability instances, stateless nodes were incorrectly assigned as the primary node.
    - |
      On an instance where an administrator configured `logrotate.maxsize` via `ghe-config` with a non-gigabyte unit suffix (for example, `256M` or `512k`), the resulting logrotate configuration was invalid, which silently stopped log rotation and could allow logs to fill the disk.
    - |
      `ghe-config-apply` showed a validation warning when more than one `github-stream-processors` container ran, even when multiple allocations are expected to be scheduled.
    - |
      After an upgrade, `ghe-config-apply` could fail with `rake aborted! VERSIONS must be a comma-separated list of integers` when completing post-upgrade live migrations due to corrupted command output in the transitions value.
    - |
      On the Management Consoles monitor dashboard, the Memory and Disk usage panels on the Operational Health dashboard displayed values on the vertical axis as raw bytes (for example, `500000000000`) instead of human-readable units.
    - |
      On an instance with clustering or high availability configured, setting up MySQL replication on a replica node sometimes failed during a configuration apply. The failure occurred intermittently when MySQL restarted before the setup process could complete.
    - |
      On an instance with GitHub Actions enabled, repositories that required actions to be pinned to a full-length commit SHA incorrectly blocked workflows that referenced local actions within the same repository (for example, `./.github/actions/my-action`). Local actions are now excluded from the SHA-pinning policy check, since they cannot be pinned to a SHA.
    - |
      On an instance with a large number of organizations, {% data variables.product.pat_generic %} (PAT) conditional access policy evaluation triggered a full organization enumeration, significantly increasing MySQL load and degrading performance.
    - |
      When multiple users updated labels on the same issue or pull request at the same time, labels added by one user could be lost.
    - |
      Organization owners, security managers, and enterprise administrators in some configurations experienced validation errors when they tried to modify code security configurations after upgrading GitHub Enterprise Server if the instance had uninstalled security products.
    - |
      Suspended users were listed in an organization team's list of members.
    - |
      On instances that served GraphQL API requests over an extended period without restarting, memory usage on the appliance grew continuously without an upper bound. This could lead to degraded performance or resource exhaustion on long-running instances. Deferred GraphQL query state is now properly released after each request completes.
  changes:
    - |
      Organization owners can configure source and target access tokens for Enterprise Live Migrations in their organization settings. Previously, these tokens needed to be configured in the terminal over SSH.
    - |
      The default `maxconn` (maximum connections) value for HAProxy has increased from 1,024 to 8,192 across all proxies. Previously, large customers reported surpassing the limit on high-traffic services.
    - |
      Site administrators can configure the maximum size of archives exported by `ghe-migrator` by setting the `GHECM_EXPORT_ARCHIVE_MAX_SIZE_GB` environment variable. Previously, exports were subject to an 80 GB limit, which could prevent large GHES-to-GHES migrations from completing. Setting the variable to `0` removes the limit entirely.
    - |
      Administrators who lose access to both SSH and the Management Console can recover their instance by selecting recovery mode from the GRUB boot menu, which is now displayed during boot for 10 seconds.
    - |
      To guard against rare image corruption caused by an unexpected restart or interruption during an upgrade, the integrity of Docker images is now verified after an upgrade completes. If a corrupted image is detected, a warning is logged so an administrator can recover it.
    - |
      On instances with multiple nodes, to avoid network overload, the limit of rsync network repairs  per host has been lowered from 80 to 10.

      You may notice this limit when adding a new replica node if many repository networks or gists need to be copied. Administrators can increase the limit to speed up replication, at the risk of saturating network connection.

      To configure the limit, update `max-rsync-repairs-per-target-host` in `/data/user/common/github.conf`, then run `ghe-config-apply`.
    - |
      To reduce failed repairs of large repositories or networks, such as monorepos, the timeout for repository and network repair operations has been increased.
  known_issues:
    - |
      During an upgrade of GitHub Enterprise Server, custom firewall rules are removed. If you use custom firewall rules, you must reapply them after upgrading.
    - |
      During the validation phase of a configuration run, a `No such object` error may occur for the Notebook and Viewscreen services. This error can be ignored as the services should still correctly start.
    - |
      If the root site administrator is locked out of the Management Console after failed login attempts, the account does not unlock automatically after the defined lockout time. Someone with administrative SSH access to the instance must unlock the account using the administrative shell. For more information, see [AUTOTITLE](/admin/administering-your-instance/administering-your-instance-from-the-web-ui/troubleshooting-access-to-the-management-console#unlocking-the-root-site-administrator-account).
    - |
      {% data reusables.release-notes.large-adoc-files-issue %}
    - |
      Admin stats REST API endpoints may timeout on appliances with many users or repositories. Retrying the request until data is returned is advised.
    - |
      When following the steps for [Replacing the primary MySQL node](/admin/monitoring-managing-and-updating-your-instance/configuring-clustering/replacing-a-cluster-node#replacing-the-primary-mysql-node), step 14 (running `ghe-cluster-config-apply`) might fail with errors. If this occurs, re-running `ghe-cluster-config-apply` is expected to succeed.
    - |
      Running a config apply as part of the steps for [Replacing a node in an emergency](/admin/monitoring-managing-and-updating-your-instance/configuring-clustering/replacing-a-cluster-node#replacing-a-node-in-an-emergency) may fail with errors if the node being replaced is still reachable. If this occurs, shutdown the node and repeat the steps.
    - |
      {% data reusables.release-notes.2024-06-possible-frontend-5-minute-outage-during-hotpatch-upgrade %}
    - |
      When restoring data originally backed up from a 3.13 or greater appliance version, the Elasticsearch indices need to be reindexed before some of the data will show up.  This happens via a nightly scheduled job.  It can also be forced by running `/usr/local/share/enterprise/ghe-es-search-repair`.
    - |
      When enabling automatic update checks for the first time in the Management Console, the status is not dynamically reflected until the "Updates" page is reloaded.
    - |
      When restoring from a backup snapshot, a large number of `mapper_parsing_exception` errors may be displayed.
    - |
      When initializing a new GHES cluster, nodes with the `consul-server` role should be added to the cluster before adding additional nodes. Adding all nodes simultaneously creates a race condition between nomad server registration and nomad client registration.
    - |
      In a cluster, the host running restore requires access the storage nodes via their private IPs.
    - |
      On an instance hosted on Azure, commenting on an issue via email meant the comment was not added to the issue.
    - |
      After a restore, existing outside collaborators cannot be added to repositories in a new organization. This issue can be resolved by running `/usr/local/share/enterprise/ghe-es-search-repair` on the appliance.
    - |
      After a geo-replica is promoted to be a primary by running `ghe-repl-promote`, the actions workflow of a repository does not have any suggested workflows.
    - |
      When publishing npm packages in a workflow after restoring from a backup to GitHub Enterprise Server 3.13.5.gm4 or 3.14.2.gm3, you may encounter a `401 Unauthorized` error from the GitHub Packages service. This can happen if the restore is from an N-1 or N-2 version and the workflow targets the npm endpoint on the backup instance. To avoid this issue, ensure the access token is valid and includes the correct scopes for publishing to GitHub Packages.
    - |
      The setting to define private registries at the organization level for code scanning is only available if dependabot is also enabled for the instance.
    - |
      Upgrading or hotpatching to 3.19.1 may fail on nodes that have been continuously upgraded from versions older than 2021 (i.e. 2.17). If this issue occurs, you will see log entries prefixed with `invalid secret` in ghe-config.log. If you are running nodes from these older versions, it is recommended not to upgrade to 3.19.1.
    - |
      An issue in the Management Console means the Backups (Preview) and Updates tabs may fail to open and instead return an Internal Server Error. We recommend using the command line interface (CLI) for backups and updates.
    - |
      When applying an enterprise security configuration to all repositories (for example, enabling Secret Scanning or Code Scanning across all repositories), the system immediately enqueues enablement jobs for every organization in the enterprise simultaneously. For enterprises with a large number of repositories, this can result in significant system load and potential performance degradation. If you manage a large enterprise with many organizations and repositories, we recommend applying security configurations at the organization level rather than at the enterprise level in the UI. This allows you to enable security features incrementally and monitor system performance as you roll out changes.
    - |
      Administrators upgrading to certain patch releases encountered a "Failed to generate an OIDC token" error during the `Update Servicing Resources` step when GitHub Actions was configured with Google Cloud Storage (GCS) or AWS S3 using OpenID Connect (OIDC) authentication. The upgrade was blocked and could not complete. To work around this issue, administrators could apply a manual patch by running `sudo sed -i.bak 's|ghe-actions-console -s  -c Update-Service|ghe-actions-console -s  --no-blob-creds -c Update-Service|g' /usr/local/bin/ghe-actions-update` followed by `ghe-config-apply`.
