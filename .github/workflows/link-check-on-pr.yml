name: 'Link Check: On PR'

# **What it does**: Checks internal links in changed content files.
# **Why we have it**: To catch broken links before they're merged.
# **Who does it impact**: Docs content.

on:
  workflow_dispatch:
  # merge_group:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

# Cancel in-progress runs for the same PR
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  check-links:
    name: Check links
    runs-on: ubuntu-latest
    if: github.repository == 'github/docs-internal' || github.repository == 'github/docs'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fetch 2 commits so tj-actions/changed-files can diff without extra API calls
          fetch-depth: 2

      - uses: ./.github/actions/node-npm-setup

      - name: Generate GitHub App token
        if: ${{ github.repository == 'github/docs-internal' }}
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: github
          repositories: docs-early-access

      - uses: ./.github/actions/get-docs-early-access
        if: ${{ github.repository == 'github/docs-internal' }}
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            content/**/*.md
            data/**/*.md

      - name: Check links in changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        # Work in progress: never fail the PR. The comment is informational only.
        continue-on-error: true
        env:
          FILES_CHANGED: ${{ steps.changed-files.outputs.all_changed_files }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHOULD_COMMENT: ${{ secrets.DOCS_BOT_APP_ID != '' }}
          FAIL_ON_FLAW: false
          ENABLED_LANGUAGES: en
        run: npm run check-links-pr

      - name: No content changes
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No content files changed. Skipping link check."
